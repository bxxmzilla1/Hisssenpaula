<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HISEN — Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: hsl(151, 31%, 10%);
        color: hsl(43, 44%, 93%);
        font-family: "PT Sans", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
      }
      img {
        width: 96px;
        height: 96px;
        border-radius: 20px;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 1.6rem;
        margin: 0 0 12px;
        color: hsl(24, 62%, 59%);
      }
      p {
        margin: 0 0 24px;
        line-height: 1.6;
        color: hsl(43, 44%, 80%);
      }
      button {
        background: hsl(24, 62%, 59%);
        color: hsl(24, 30%, 10%);
        border: 0;
        padding: 12px 24px;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
      }
      button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/icon-192.png" alt="HISEN" />
      <h1>You're offline</h1>
      <p>
        It looks like you've lost your internet connection. Please check your
        network and try again. / Parece que perdiste tu conexión a internet.
      </p>
      <button onclick="location.reload()">Retry / Reintentar</button>
    </div>
  </body>
</html>
